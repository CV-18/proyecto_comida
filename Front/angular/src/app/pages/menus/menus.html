<section class="bg-gray-50 min-h-screen pb-14 pt-8">
	<div class="max-w-6xl mx-auto px-4">
		<div class="text-center mb-8">
			<h1 class="text-4xl font-bold text-gray-900 mb-2">{{ 'menus.title' | translate }}</h1>
			<p class="text-gray-500">{{ 'menus.subtitle' | translate }}</p>
		</div>

		<div class="mb-8 bg-white p-2 rounded-2xl border border-gray-100 shadow-sm overflow-x-auto">
			<div class="flex gap-2 min-w-max">
				@for (category of categories; track category) {
					<button
						type="button"
						(click)="setCategory(category)"
						class="px-5 py-2.5 rounded-xl text-sm font-medium transition-colors"
						[class]="activeCategory === category ? 'px-5 py-2.5 rounded-xl text-sm font-medium bg-gray-900 text-white' : 'px-5 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50'"
					>
						{{ ('common.countries.' + category.toLowerCase()) | translate }}
					</button>
				}
			</div>
		</div>

		<div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5">
			@for (menu of menus; track menu.id) {
				<article class="bg-white border border-gray-100 rounded-3xl p-5 shadow-sm hover:shadow-md transition-shadow">
					<div class="w-10 h-10 rounded-xl bg-orange-100 text-orange-600 flex items-center justify-center text-sm font-bold mb-4">M</div>
					<h2 class="font-semibold text-gray-900 text-lg">{{ menu.name }}</h2>
					<p class="text-sm text-gray-500 mt-1">{{ 'menus.description' | translate }}</p>
					<div class="mt-5 flex items-center justify-between">
						<p class="text-xl font-bold text-gray-900">{{ menu.price | currency:translateService.currencyCode }}</p>
						<button type="button" (click)="addToCart(menu)" class="px-4 py-2 rounded-full bg-orange-500 text-white text-sm font-medium hover:bg-orange-600">
							{{ 'menus.add' | translate }}
						</button>
					</div>
				</article>
			}
		</div>
	</div>
</section>
