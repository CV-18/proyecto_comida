@if (isOpen()) {
	<div class="fixed inset-0 z-50 flex items-center justify-center">
		<button
			type="button"
			class="absolute inset-0 bg-black/50"
			(click)="close()"
			aria-label="Cerrar modal"
		></button>

		<div class="relative bg-white rounded-lg shadow-2xl p-6 w-full max-w-md mx-4">
			<!-- Header -->
			<div class="flex items-center justify-between mb-4 border-b border-gray-200 pb-4">
				<h2 class="text-xl font-bold text-gray-900">
					@if (editingPaymentId()) {
						Editar método de pago
					} @else {
						{{ 'payment.add_card' | translate }}
					}
				</h2>
				<button
					type="button"
					class="text-gray-500 hover:text-gray-700 text-2xl"
					(click)="close()"
				>
					×
				</button>
			</div>

			<!-- Error Message -->
			@if (errorMessage()) {
				<div class="mb-4 p-3 rounded-lg bg-red-50 border border-red-200">
					<p class="text-sm text-red-700">{{ errorMessage() }}</p>
				</div>
			}

			<!-- Form -->
			<form (ngSubmit)="submitPaymentMethod()" class="space-y-4">
				<!-- Card Type Selection -->
				<div>
					<label class="block text-sm font-medium text-gray-700 mb-2">
						{{ 'payment.card_type' | translate }}
					</label>
					<div class="flex gap-4">
						<label class="flex items-center">
							<input
								type="radio"
								value="TARJETA_CREDITO"
								[(ngModel)]="formData.tipo"
								name="cardType"
								class="mr-2"
							/>
							<span class="text-sm text-gray-700">Tarjeta de crédito</span>
						</label>
						<label class="flex items-center">
							<input
								type="radio"
								value="TARJETA_DEBITO"
								[(ngModel)]="formData.tipo"
								name="cardType"
								class="mr-2"
							/>
							<span class="text-sm text-gray-700">Tarjeta de débito</span>
						</label>
						<label class="flex items-center">
							<input
								type="radio"
								value="PAYPAL"
								[(ngModel)]="formData.tipo"
								name="cardType"
								class="mr-2"
							/>
							<span class="text-sm text-gray-700">PayPal</span>
						</label>
					</div>
				</div>

				<!-- Card Number -->
				<div>
					<label class="block text-sm font-medium text-gray-700 mb-2">
						{{ 'payment.card_number' | translate }}
					</label>
					<input
						type="text"
						[(ngModel)]="formData.numeroTarjeta"
						name="cardNumber"
						placeholder="1234 5678 9012 3456"
						class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none"
						[disabled]="isSubmitting()"
					/>
				</div>

				<!-- Expiry -->
				<div>
					<div>
						<label class="block text-sm font-medium text-gray-700 mb-2">
							{{ 'payment.expiry' | translate }}
						</label>
						<input
							type="text"
							[(ngModel)]="formData.fechaExpiracion"
							name="expiry"
							placeholder="MM/AA"
							maxlength="5"
							class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none"
							[disabled]="isSubmitting()"
						/>
					</div>
				</div>

				<!-- Info -->
				<div class="mt-4 p-3 rounded-lg bg-blue-50 border border-blue-200">
					<p class="text-xs text-blue-700">
						💡 {{ 'payment.card_saved' | translate }}
					</p>
				</div>

				<!-- Buttons -->
				<div class="flex gap-3 mt-6 pt-4 border-t border-gray-200">
					<button
						type="button"
						(click)="close()"
						class="flex-1 px-4 py-2 rounded-lg border border-gray-300 text-gray-700 font-medium hover:bg-gray-50 disabled:opacity-60"
						[disabled]="isSubmitting()"
					>
						{{ 'nav.cancel' | translate }}
					</button>
					<button
						type="submit"
						class="flex-1 px-4 py-3 rounded-lg bg-amber-500 text-white font-medium hover:bg-amber-600 disabled:opacity-60"
						[disabled]="isSubmitting()"
					>
						@if (isSubmitting()) {
							Procesando...
						} @else {
							@if (editingPaymentId()) {
								Guardar cambios
							} @else {
								{{ 'payment.add_card' | translate }}
							}
						}
					</button>
				</div>
			</form>
		</div>
	</div>
}
