@if (isOpen()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center">
    <button type="button" class="absolute inset-0 bg-black/40" (click)="close()" aria-label="Cerrar modal"></button>

    <div class="relative bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
      <!-- Header -->
      <div class="flex items-center justify-between border-b border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-900">{{ 'checkout.guest' | translate }}</h2>
        <button type="button" class="text-gray-400 hover:text-gray-600" (click)="close()">
          <span class="sr-only">Cerrar</span>
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <!-- Tabs -->
      <div class="flex border-b border-gray-200">
        <button
          type="button"
          (click)="switchTab('address')"
          [class.border-b-2]="activeTab() === 'address'"
          [class.border-blue-500]="activeTab() === 'address'"
          [class.text-blue-600]="activeTab() === 'address'"
          [class.text-gray-600]="activeTab() !== 'address'"
          class="flex-1 px-4 py-3 font-medium text-center"
        >
          {{ 'checkout.address' | translate }}
        </button>
        <button
          type="button"
          (click)="switchTab('payment')"
          [class.border-b-2]="activeTab() === 'payment'"
          [class.border-blue-500]="activeTab() === 'payment'"
          [class.text-blue-600]="activeTab() === 'payment'"
          [class.text-gray-600]="activeTab() !== 'payment'"
          class="flex-1 px-4 py-3 font-medium text-center"
        >
          {{ 'checkout.payment' | translate }}
        </button>
      </div>

      <!-- Content -->
      <div class="p-6">
        <!-- Error Message -->
        @if (formError()) {
          <div class="mb-4 p-3 rounded-lg bg-red-50 border border-red-200">
            <p class="text-sm text-red-700">{{ formError() }}</p>
          </div>
        }

        <!-- Address Tab -->
        @if (activeTab() === 'address') {
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'address.street' | translate }}</label>
              <input
                type="text"
                [(ngModel)]="addressForm.direccion"
                placeholder="Calle y número"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'address.postalCode' | translate }}</label>
                <input
                  type="text"
                  [(ngModel)]="addressForm.codigoPostal"
                  placeholder="12345"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'address.city' | translate }}</label>
                <input
                  type="text"
                  [(ngModel)]="addressForm.ciudad"
                  placeholder="Ciudad"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'address.country' | translate }}</label>
              <select
                [(ngModel)]="addressForm.pais"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
                @for (country of countries; track country) {
                  <option [value]="country">{{ country }}</option>
                }
              </select>
            </div>
          </div>
        }

        <!-- Payment Tab -->
        @if (activeTab() === 'payment') {
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'payment.cardType' | translate }}</label>
              <select
                [(ngModel)]="paymentForm.tipo"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
                @for (type of cardTypes; track type) {
                  <option [value]="type">{{ type }}</option>
                }
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'payment.cardNumber' | translate }}</label>
              <input
                type="text"
                placeholder="1234 5678 9012 3456"
                maxlength="19"
                (input)="formatCardNumber($event)"
                [value]="paymentForm.numeroTarjeta"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
              <p class="text-xs text-gray-500 mt-1">{{ 'payment.cardNotSaved' | translate }}</p>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'payment.expiration' | translate }}</label>
                <input
                  type="text"
                  placeholder="MM/YY"
                  maxlength="5"
                  (input)="formatExpiration($event)"
                  [value]="paymentForm.fechaExpiracion"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'payment.cvv' | translate }}</label>
                <input
                  type="text"
                  placeholder="123"
                  maxlength="4"
                  (input)="formatCVV($event)"
                  [value]="paymentForm.cvv"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>
            </div>
          </div>
        }
      </div>

      <!-- Footer -->
      <div class="flex gap-3 border-t border-gray-200 p-6">
        <button
          type="button"
          (click)="close()"
          class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-gray-700 font-medium hover:bg-gray-50"
        >
          {{ 'nav.cancel' | translate }}
        </button>
        @if (activeTab() === 'address') {
          <button
            type="button"
            (click)="switchTab('payment')"
            class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700"
          >
            {{ 'checkout.next' | translate }}
          </button>
        } @else {
          <button
            type="button"
            (click)="submit()"
            [disabled]="isProcessing()"
            class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed"
          >
            @if (isProcessing()) {
              {{ 'checkout.processing' | translate }}
            } @else {
              {{ 'checkout.submit' | translate }}
            }
          </button>
        }
      </div>
    </div>
  </div>
}
